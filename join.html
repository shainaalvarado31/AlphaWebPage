<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpha Computer Association | Join</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">
  <div class="container navbar">
    <div class="brand">
      <img src="images/alpha-logo.png" class="logo" alt="Alpha Logo">
    </div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About Alpha</a>
      <a href="committee.html">Committee</a>
      <a href="events.html">Events & Activities</a>
      <a href="contact.html">Contact Us</a>
    </nav>

    <a class="join-btn" href="join.html">Join Us</a>
  </div>
</header>

<main class="page-section">

  <!-- Intro -->
  <section class="container">
    <h2 class="page-title">Join Alpha</h2>
    <p class="lead">
      Interested in technology, leadership, and growth? Fill out the form below to become part of Alpha.
    </p>
  </section>

  <!-- Form -->
  <section class="container form-card">

    <h3 class="section-title">Membership Application</h3>

    <form name="join-alpha" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="join-alpha">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" name="name" required>
      </div>

      <div class="form-group">
        <label for="student-number">Student Number</label>
        <input id="student-number" type="text" name="student-number" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="major">Major</label>
        <input id="major" type="text" name="major" required>
      </div>

      <div class="form-group">
        <label for="year">Academic Year</label>
        <select id="year" name="year" required>
          <option value="">Select your academic year</option>
          <option>Freshman (1st Year)</option>
          <option>Sophomore (2nd Year)</option>
          <option>Junior (3rd Year)</option>
          <option>Senior (4th Year)</option>
          <option>5th Year or More</option>
        </select>
      </div>

      <div class="form-group">
        <label for="interests">Areas of Interest</label>
        <textarea id="interests" name="interests" placeholder="Programming, Cybersecurity, Data, etc..."></textarea>
      </div>

      <div class="form-group">
        <label for="message">Why do you want to join Alpha?</label>
        <textarea id="message" name="message"></textarea>
      </div>

      <button type="submit" class="submit-btn">Submit Application</button>
    </form>

  </section>

</main>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 Shaina N. Alvarado Febus</p>
  </div>
</footer>

</body>
</html>
